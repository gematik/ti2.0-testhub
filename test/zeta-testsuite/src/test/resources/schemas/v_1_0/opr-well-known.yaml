# Schema for the PEP mock well-known response served at /.well-known/oauth-protected-resource
#
# NOTE: The PEP mock currently returns an Authorization Server Metadata style document
# (similar to RFC 8414) rather than a strict RFC 9728 Protected Resource Metadata document.
# A proper RFC 9728 response would use "resource" instead of "issuer" and include
# "authorization_servers" instead of embedding token/authorization endpoints directly.
# This schema validates what the mock *actually* returns.
$schema: "http://json-schema.org/draft-07/schema#"
title: PEP Mock Well-Known Response
description: >-
  Schema for the well-known JSON document returned by the PEP mock at
  /.well-known/oauth-protected-resource. Currently follows an Authorization Server
  Metadata style (RFC 8414) rather than strict RFC 9728.
type: object
properties:
  issuer:
    type: string
    description: The URL of the issuer.
  authorization_endpoint:
    type: string
    description: The URL of the authorization endpoint.
  token_endpoint:
    type: string
    description: The URL of the token endpoint.
  jwks_uri:
    type: string
    description: URL of the JSON Web Key Set document.
  nonce_endpoint:
    type: string
    description: The URL of the nonce endpoint.
  openid_providers_endpoint:
    type: string
    description: The URL of the OpenID providers endpoint.
  scopes_supported:
    type: array
    description: The scopes supported.
    items:
      type: string
  response_types_supported:
    type: array
    description: The response types supported.
    items:
      type: string
  response_modes_supported:
    type: array
    description: The response modes supported.
    items:
      type: string
  grant_types_supported:
    type: array
    description: The grant types supported.
    items:
      type: string
  token_endpoint_auth_methods_supported:
    type: array
    description: The token endpoint authentication methods supported.
    items:
      type: string
  token_endpoint_auth_signing_alg_values_supported:
    type: array
    description: The signing algorithms supported at the token endpoint.
    items:
      type: string
  service_documentation:
    type: string
    description: A URL to the service documentation.
  ui_locales_supported:
    type: array
    description: The supported UI locales.
    items:
      type: string
  code_challenge_methods_supported:
    type: array
    description: The code challenge methods supported for PKCE.
    items:
      type: string
required:
  - issuer
  - token_endpoint

