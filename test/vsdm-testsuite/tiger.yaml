tigerProxy:
  proxyPort: ${ports.localTigerProxyProxyPort}
  adminPort: ${ports.localTigerProxyAdminPort}
  tls:
    serverRootCa: "classpath:tigerProxy.p12"
  trafficEndpoints:
    - "http://localhost:${free.port.12}"
  activateRbelParsingFor:
    - websocket
    - x509
  keyFolders:
    - .
  proxyRoutes:
    - from: http://popp-zeta-pep:${ports.localTigerProxyProxyPort}
      to: http://127.0.0.1:9200/ #9110
      matchForProxyType: false
      preserveHostHeader: true
    - from: http://popp-zeta-pdp:${ports.localTigerProxyProxyPort}
      to: http://127.0.0.1:9200/ #9112
      matchForProxyType: false
      preserveHostHeader: true
    - from: http://vsdm-zeta-ingress:${ports.localTigerProxyProxyPort}
      to: http://127.0.0.1:9119/
      preserveHostHeader: true
    - from: https://vsdm-zeta-ingress
      to: http://127.0.0.1:9119/ #9119
      preserveHostHeader: true
    - from: /cardTerminalClient
      to: http://127.0.0.1:${ports.cardTerminalPort}/
  rewriteHostHeader: false

servers:
  tls-tiger-proxy:
    type: tigerProxy
    tigerProxyConfiguration:
      proxyPort: 443
      adminPort: ${free.port.12}
      tls:
        serverRootCa: "classpath:tigerProxy.p12"
      activateRbelParsingFor:
        - websocket
      keyFolders:
        - .
      proxyRoutes:
        - from: https://popp-zeta-pep:${ports.localTigerProxyProxyPort}
          to: https://127.0.0.1:9200/ #9110
          matchForProxyType: false
          preserveHostHeader: true
        - from: https://popp-zeta-pdp:${ports.localTigerProxyProxyPort}
          to: https://127.0.0.1:9200/ #9112
          matchForProxyType: false
          preserveHostHeader: true
        - from: https://vsdm-zeta-ingress:${ports.localTigerProxyProxyPort}
          to: https://127.0.0.1:9119/
          preserveHostHeader: true
        - from: https://vsdm-zeta-ingress
          to: https://127.0.0.1:9119/ #9119
          preserveHostHeader: true
        - from: /cardTerminalClient
          to: http://127.0.0.1:${ports.cardTerminalPort}/
      rewriteHostHeader: false
  card-terminal-client:
    type: docker
    version: local
    healthcheckUrl: http://127.0.0.1:${ports.cardTerminalPort}/service/status
    source:
      - de.gematik.ti20.simsvc.client/card-terminal-client-simservice
    dockerOptions:
      proxied: false
      ports:
        - "${ports.cardTerminalPort}:80"
        - "5005:5005" #debug port
    environment:
      - "JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      - "JAVA_FLAGS='Dhttp.proxyHost=host.docker.internal -Dhttp.proxyPort=${ports.localTigerProxyProxyPort} -Dhttps.proxyHost=host.docker.internal -Dhttps.proxyPort=${ports.localTigerProxyProxyPort}'"
      - "HTTP_PROXY=http://host.docker.internal:${ports.localTigerProxyProxyPort}"

  vsdm-client:
    type: docker
    version: local
    source:
      - de.gematik.ti20.simsvc.client/vsdm-client-simservice
    healthcheckUrl: http://127.0.0.1:${ports.vsdmClientPort}/service/status
    dockerOptions:
      proxied: false
      ports:
        - "${ports.vsdmClientPort}:80"
        - "5006:5006" #debug port
      extraHosts:
        - popp-zeta-pep:host-gateway
        - popp-zeta-pdp:host-gateway
        - vsdm-zeta-ingress:host-gateway
      copyFiles:
        - sourcePath: ../../doc/docker/backend/zeta/smcb-private/smcb_private.alias.txt
          destinationPath: /tmp/zeta/smcb_private.alias.txt
        - sourcePath: ../../doc/docker/backend/zeta/smcb-private/smcb_private.pw.txt
          destinationPath: /tmp/zeta/smcb_private.pw.txt
        - sourcePath: ../../doc/docker/backend/zeta/smcb-private/smcb_private.p12
          destinationPath: /tmp/zeta/smcb_private.p12
    environment:
      - "POPP_HTTP_URL=http://popp-zeta-pep:${ports.localTigerProxyProxyPort}"
      - "POPP_WS_URL=ws://popp-zeta-pep:${ports.localTigerProxyProxyPort}"
      - "VSDM_RESOURCE_SERVER_URL=https://vsdm-zeta-ingress"
      - "OTEL_SERVICE_NAME=vsdm-client"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318"
      - "JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006"
      - "LOGGING_LEVEL_ROOT=DEBUG"
      - "ZETASDK_SMCB_ALIAS_PATH=/tmp/zeta/smcb_private.alias.txt"
      - "ZETASDK_SMCB_PRIVATE_KEY_PASSWORD_PATH=/tmp/zeta/smcb_private.pw.txt"
      - "ZETASDK_SMCB_PRIVATE_KEY_PATH=/tmp/zeta/smcb_private.p12"

lib:
  workflowUiPort: ${ports.tigerWorkflowUiPort}
  rbelPathDebugging: false
  activateWorkflowUi: true
  trafficVisualization: true
  httpClientConfig:
    activateRbelWriter: true
  logging.level:
    de.gematik.test.tiger.mockserver: TRACE
    localTigerProxy: TRACE
  additionalKeyStorePasswords:
    ["testpassword"]

fhir:
  encoded: json

testdata:
  terminal:
    simsvc:
      serialNumber: 1234567890
      #      url: ws://127.0.0.1:8000
      url: ws://thisValueWillNotBeUsed #ws://host.docker.internal:${ports.localTigerProxyProxyPort}/cardTerminalClient

additionalConfigurationFiles:
  - filename: ports.yaml
