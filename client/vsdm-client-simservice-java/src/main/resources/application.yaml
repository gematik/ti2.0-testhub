app.version: 0.0.1-dev

server:
  error:
    whitelabel.enabled: false
    include-message: always
  port: ${SERVER_PORT:80}

popp:
  http:
    url: ${POPP_HTTP_URL}
  ws:
    url: ${POPP_WS_URL:}

vsdm:
  resourceServerUrl: ${VSDM_RESOURCE_SERVER_URL}
  use-mock-popp-token: true
  popp-token-generator-url: ${POPP_TOKEN_GENERATOR_URL}

zetasdk:
  smcbAlias: ${ZETASDK_SMCB_ALIAS}
  smcbPrivateKeyPassword: ${ZETASDK_SMCB_PRIVATE_KEY_PASSWORD}
  smcbPrivateKeyPath: ${ZETASDK_SMCB_PRIVATE_KEY_PATH}

spring:
  ssl:
    bundle:
      pem:
        client:
          truststore:
            certificate: "classpath:tigerProxy.pem"
