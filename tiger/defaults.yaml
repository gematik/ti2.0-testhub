smoke:
  endpoints:
    poppZetaPdp:
      url: http://localhost:9112/service/status
      path: /service/status
      name: PoPP ZeTA PDP
    poppZetaPep:
      url: http://localhost:9110/service/status
      path: /service/status
      name: PoPP ZeTA PEP
    vsdmZetaIngress:
      url: https://localhost:9119/.well-known/oauth-protected-resource
      path: /.well-known/oauth-protected-resource
      name: VSDM ZeTA Ingress
    vsdmZetaPep:
      url: http://localhost:9120/
      path: /
      name: VSDM ZeTA PEP
    vsdmZetaPdp:
      url: http://localhost:9122/auth/health/live
      path: /auth/health/live
      name: VSDM ZeTA PDP

zeta:
  server:
    popp:
      url: http://127.0.0.1:9210
    poppTokenGenerator:
      url: http://127.0.0.1:9500
    pdp:
      tokenUrl: http://127.0.0.1:9112/token
      # Keycloak issuer – used as 'aud' in client_assertion JWTs (must match KC_HOSTNAME + realm)
      issuer: https://vsdm-zeta-ingress/auth/realms/zeta-guard
  timeouts:
    httpRequestSeconds: 10
    healthCheckSeconds: 20
    healthCheckPollIntervalMs: 250
    wsConnectionSeconds: 10
    wsMessageSeconds: 10

