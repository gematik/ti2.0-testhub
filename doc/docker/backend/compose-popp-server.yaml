services:
  popp-ingress:
    container_name: popp-ingress
    image: gematik1/tiger-proxy-image:4.1.15
    ports:
      - "9200:80"
      - "8223:8080"
    volumes:
      - ./popp-tiger-ingress.yaml:/app/application.yaml:ro
    networks:
      - testhub_backend

  testhub-popp-server:
    container_name: testhub-popp-server
    image: de.gematik.ti20.simsvc.server/popp-server-mockservice:local
    ports:
      - "9210:80"
      - "5009:5009"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - OTEL_SERVICE_NAME=popp-zeta-pep
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - JAVA_TOOL_OPTIONS="-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5009"
    depends_on:
      - otel-collector
    networks:
      - testhub_backend

  popp-zeta-pep:
    container_name: popp-zeta-pep
    image: de.gematik.ti20.simsvc.server/zeta-pep-server-mockservice:local
    ports:
      - "9110:80"
      - "5007:5007"
    environment:
      - SPRING_PROFILES_ACTIVE=docker-popp
      - PROXY_HTTP_URL=http://testhub-popp-server
      - PROXY_WS_URL=http://testhub-popp-server
      - WK_ISSUER=http://popp-zeta-pep:80
      - WK_AUTH_EP=http://popp-zeta-pdp:80/auth
      - WK_TOKEN_EP=http://popp-zeta-pdp:80/token
      - WK_NONCE_EP=http://popp-zeta-pdp:80/nonce
      - OTEL_SERVICE_NAME=popp-zeta-pep
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - JAVA_TOOL_OPTIONS="-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5007"
    depends_on:
      - otel-collector
    networks:
      - testhub_backend

  popp-zeta-pdp:
    container_name: popp-zeta-pdp
    image: de.gematik.ti20.simsvc.server/zeta-pdp-server-mockservice:local
    ports:
      - "9112:80"
      - "5008:5008"
    environment:
      - SPRING_PROFILES_ACTIVE=docker-popp
      - OTEL_SERVICE_NAME=popp-zeta-pdp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - JAVA_TOOL_OPTIONS="-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5008"
    depends_on:
      - otel-collector
    networks:
      - testhub_backend

  popp-token-generator:
    container_name: popp-token-generator
    image: gematik1/popp-token-generator:1.0.8
    ports:
      - "9500:80"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - testhub_backend

networks:
  testhub_backend:
