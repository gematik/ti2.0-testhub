server {
  listen 443 ssl;
  server_name  vsdm-zeta-ingress;

    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

  location /auth {
    proxy_pass                                  http://vsdm-zeta-pdp/auth;
    #proxy_set_header Host                       vsdm-zeta-ingress;
    proxy_set_header X-Forwarded-Host           vsdm-zeta-ingress;
    proxy_set_header X-Forwarded-Proto          https;
  }
  location / {
    # root /usr/share/nginx/html;

    proxy_pass                                  http://vsdm-zeta-pep/;
    proxy_set_header Host                       vsdm-zeta-ingress;
    proxy_set_header X-Forwarded-From           vsdm-zeta-ingress;
  }
}